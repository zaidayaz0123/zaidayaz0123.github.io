<style>
  :root{
    --paper:      #f7f5f0;
    --paper-dim:  #efece3;
    --ink:        #16181d;
    --ink-soft:   #565a63;
    --ink-faint:  #8b8f97;
    --line:       #d9d4c7;

    --ink-bg:     #101218;
    --ink-bg-2:   #1a1d26;
    --on-ink:     #f4f2ea;
    --on-ink-dim: #9298a6;
    --on-ink-line:#2c303c;

    --accent:      #8a1f35;
    --accent-soft: #b23a52;
    --accent-pale: #f3e0dd;
    --gold:        #b6863c;
    --gold-soft:   #d4aa63;

    --serif: 'Fraunces', Georgia, serif;
    --sans:  'Inter', -apple-system, 'Segoe UI', sans-serif;
    --mono:  'IBM Plex Mono', ui-monospace, Menlo, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent); color:var(--on-ink); }
  a{ color:inherit; text-decoration:none; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }
  img,svg{ display:block; max-width:100%; }

  .wrap{ max-width:1080px; margin:0 auto; padding:0 32px; }
  @media (max-width:640px){ .wrap{ padding:0 20px; } }

  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
  }
  .serif{ font-family:var(--serif); }

  .site-header{
    position:sticky; top:0; z-index:60;
    background:rgba(247,245,240,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .site-header .wrap{
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .monogram{
    width:36px; height:36px; border:1px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-weight:500; font-size:14px; letter-spacing:.02em;
    flex-shrink:0; color:var(--accent);
    transition:border-color .2s ease, color .2s ease;
  }
  .site-header:hover .monogram{ border-color:var(--gold); color:var(--gold); }
  .header-name{ font-family:var(--serif); font-size:15px; letter-spacing:.01em; }
  nav.primary-nav{ display:flex; gap:28px; }
  nav.primary-nav a{
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-soft); border-bottom:1px solid transparent; padding-bottom:2px;
    transition:color .15s ease, border-color .15s ease;
  }
  nav.primary-nav a:hover{ color:var(--accent); border-color:var(--gold); }
  .header-left{ display:flex; align-items:center; gap:14px; }
  @media (max-width:760px){ nav.primary-nav{ display:none; } }

  .hero{
    background:
      radial-gradient(ellipse 900px 500px at 12% -10%, rgba(178,58,82,0.20), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(182,134,60,0.10), transparent 55%),
      var(--ink-bg);
    color:var(--on-ink);
    padding:120px 0 96px;
    position:relative;
  }
  .hero .eyebrow{ color:var(--gold-soft); margin-bottom:22px; }
  .hero h1{
    font-family:var(--serif); font-weight:400; font-size:clamp(40px, 6.4vw, 72px);
